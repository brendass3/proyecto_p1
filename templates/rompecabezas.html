<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rompecabezas - Proyecto Web</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <h1> Rompecabezas</h1>
        <div class="user-info">
            <span class="username"> {{ username }}</span>
            <a href="/user_home" class="btn btn-back"> Volver</a>
            <button class="btn btn-logout" onclick="logout()"> Salir</button>
        </div>
    </nav>
    <div class="container">
        <div class="section">
            <h3>Escoge Imagen</h3>
            <div class="images-grid">
                {% for image in images %}
                <div class="image-option" data-id="{{ image._id }}" data-name="{{ image.nombre }}">
                    {% if image.imagen_base64 %}
                        <img src="data:image/jpeg;base64,{{ image.imagen_base64 }}" alt="{{ image.nombre }}">
                    {% else %}
                        <img src="https://via.placeholder.com/150/00d4aa/0a1f1c?text={{ image.nombre }}" alt="{{ image.nombre }}">
                    {% endif %}
                    <p>{{ image.nombre }}</p>
                </div>
                {% endfor %}
            </div>
            <h3> Escoge Tamaño</h3>
            <div class="size-options">
                <button class="size-btn" data-size="3">3×3 (9)</button>
                <button class="size-btn" data-size="4">4×4 (16)</button>
                <button class="size-btn" data-size="5">5×5 (25)</button>
            </div>
            <button class="btn btn-submit" onclick="startPuzzle()"> Comenzar</button>
        </div>
        <div id="message"></div>
        <div id="puzzle-container" style="display: none;">
            <div>
                <div>Imagen completa (referencia):</div>
                <img id="preview-img" class="preview-image">
            </div>
            <div class="grid-container" id="grid-container"></div>
            <div style="display: flex; gap: 15px; margin-top: 20px;">
                <button class="btn btn-back" onclick="resetPuzzle()"> Nuevo</button>
                <button class="btn btn-back" onclick="saveProgress()"> Guardar</button>
                <button class="btn btn-back" onclick="loadProgress()"> Cargar</button>
            </div>
        </div>
    </div>
    <script>
        let selectedImageId = null, selectedImageName = null, selectedSize = 3, puzzleId = null, gridSize = 3, currentState = null, pieceSize = 100;
        document.querySelectorAll('.image-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.image-option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                selectedImageId = this.dataset.id;
                selectedImageName = this.dataset.name;
            });
        });
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                selectedSize = parseInt(this.dataset.size);
            });
        });
        async function startPuzzle() {
            if (!selectedImageId) { showMessage('Escoge una imagen', 'error'); return; }
            const response = await fetch('/puzzle/new', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({image_id: selectedImageId, grid_size: selectedSize})
            });
            const data = await response.json();
            if (data.error) showMessage(data.error, 'error');
            else {
                puzzleId = data.puzzle_id; gridSize = data.grid_size; currentState = data.current_state;
                pieceSize = gridSize === 3 ? 120 : gridSize === 4 ? 90 : 70;
                document.getElementById('preview-img').src = `data:image/jpeg;base64,${data.imagen_base64}`;
                document.getElementById('puzzle-container').style.display = 'block';
                renderGrid(); showMessage(`Puzzle ${selectedSize}×${selectedSize} creado`, 'success');
            }
        }
        function renderGrid() {
    const container = document.getElementById('grid-container');
    container.style.gridTemplateColumns = `repeat(${gridSize}, ${pieceSize}px)`;
    container.style.width = `${gridSize * pieceSize + (gridSize - 1) * 3}px`;
    container.innerHTML = '';
    
    const previewImg = document.getElementById('preview-img');
    
    for (let row = 0; row < gridSize; row++) {
        for (let col = 0; col < gridSize; col++) {
            const pieceNum = currentState[row][col];
            const pieceRow = Math.floor(pieceNum / gridSize);
            const pieceCol = pieceNum % gridSize;
            
            const piece = document.createElement('div');
            piece.className = 'grid-piece';
            piece.style.width = `${pieceSize}px`; 
            piece.style.height = `${pieceSize}px`;
            
            // ← CORRECCIÓN: Usar url() correctamente
            piece.style.backgroundImage = `url('${previewImg.src}')`;
            piece.style.backgroundSize = `${gridSize * pieceSize}px ${gridSize * pieceSize}px`;
            piece.style.backgroundPosition = `${-pieceCol * pieceSize}px ${-pieceRow * pieceSize}px`;
            piece.style.backgroundRepeat = 'no-repeat';
            
            piece.dataset.row = row; 
            piece.dataset.col = col;
            piece.addEventListener('mousedown', handleMouseDown);
            container.appendChild(piece);
        }
    }
}
        let draggedPiece = null, draggedRow = null, draggedCol = null, isDragging = false;
        function handleMouseDown(event) {
            if (event.button !== 0) return;
            draggedPiece = event.target; draggedRow = parseInt(draggedPiece.dataset.row); draggedCol = parseInt(draggedPiece.dataset.col); isDragging = true;
            const rect = draggedPiece.getBoundingClientRect();
            draggedPiece.classList.add('dragging'); draggedPiece.style.left = rect.left + 'px'; draggedPiece.style.top = rect.top + 'px';
            document.addEventListener('mousemove', handleMouseMove); document.addEventListener('mouseup', handleMouseUp);
        }
        function handleMouseMove(event) {
            if (!isDragging) return;
            const size = draggedPiece.offsetWidth;
            draggedPiece.style.left = (event.clientX - size / 2) + 'px'; draggedPiece.style.top = (event.clientY - size / 2) + 'px';
            document.querySelectorAll('.grid-piece').forEach(piece => {
                const rect = piece.getBoundingClientRect();
                if (event.clientX >= rect.left && event.clientX <= rect.right && event.clientY >= rect.top && event.clientY <= rect.bottom && piece !== draggedPiece) piece.classList.add('hovered');
            });
        }
        function handleMouseUp() {
            if (!isDragging) return;
            isDragging = false; document.removeEventListener('mousemove', handleMouseMove); document.removeEventListener('mouseup', handleMouseUp);
            const target = document.querySelector('.grid-piece.hovered');
            if (target && target !== draggedPiece) {
                const targetRow = parseInt(target.dataset.row), targetCol = parseInt(target.dataset.col);
                const temp = currentState[draggedRow][draggedCol]; currentState[draggedRow][draggedCol] = currentState[targetRow][targetCol]; currentState[targetRow][targetCol] = temp;
                showMessage('Piezas intercambiadas!', 'success');
            }
            draggedPiece.classList.remove('dragging'); draggedPiece.style.left = ''; draggedPiece.style.top = '';
            document.querySelectorAll('.grid-piece').forEach(p => p.classList.remove('hovered')); draggedPiece = null; draggedRow = null; draggedCol = null;
            renderGrid(); checkSolved();
        }
        function checkSolved() {
            let solved = true;
            for (let row = 0; row < gridSize; row++) for (let col = 0; col < gridSize; col++) if (currentState[row][col] !== row * gridSize + col) solved = false;
            showMessage(solved ? '¡GANASTE! 🎉' : 'Aún no está resuelto', solved ? 'success' : 'error');
        }
        async function saveProgress() { const response = await fetch(`/puzzle/${puzzleId}/save`, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({current_state: currentState})}); showMessage((await response.json()).message, 'success'); }
        async function loadProgress() { const data = await (await fetch(`/puzzle/${puzzleId}/load`)).json(); if (data.error) showMessage(data.error, 'error'); else { currentState = data.current_state; gridSize = data.grid_size; pieceSize = gridSize === 3 ? 120 : gridSize === 4 ? 90 : 70; renderGrid(); showMessage('Progreso cargado!', 'success'); } }
        function resetPuzzle() { document.getElementById('puzzle-container').style.display = 'none'; puzzleId = null; currentState = null; }
        function showMessage(msg, type) { const div = document.getElementById('message'); div.textContent = msg; div.className = type; div.style.display = 'block'; }
        async function logout() { await fetch('/logout', {method: 'POST'}); window.location.href = '/'; }
    </script>
</body>
</html>
